<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <!--
      GitHub Pages serves this file for any unknown path (e.g. a direct hit
      on /projects/fico-finance-core, or a refresh on that URL). It encodes
      the intended path into a query string and redirects to the real
      index.html, which decodes it back before React Router mounts — see the
      matching script in index.html. Standard trick for client-side routing
      on GitHub Pages: https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      var pathSegmentsToKeep = 0 // 0 for a user site (username.github.io); bump to 1 if this ever moves to username.github.io/repo-name
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
